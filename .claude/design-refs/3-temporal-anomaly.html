<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Temporal Anomaly Detection System</title><style>body{margin:0;padding:0;overflow:hidden;background-color:#000}canvas{display:block;width:100vw;height:100vh}</style><script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script></head><body><script type="module">
import*as THREE from'three';const PALETTE={bg:0x000000,primaryLine:0xff0040,secondaryLine:0x4a00e0,tertiaryLine:0x05d9e8,rulerBase:0xaa2222,uiText:0xffb3ba,gridFaint:0x221111,crosshair:0x555555};const scene=new THREE.Scene();scene.background=new THREE.Color(PALETTE.bg);const frustumSize=12;const aspect=window.innerWidth/window.innerHeight;const camera=new THREE.OrthographicCamera(frustumSize*aspect/-2,frustumSize*aspect/2,frustumSize/2,frustumSize/-2,0.1,1000);camera.position.z=10;const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(window.innerWidth,window.innerHeight);document.body.appendChild(renderer.domElement);const GLYPHS={'0':[[0,0,4,0],[4,0,4,4],[4,4,0,4],[0,4,0,0],[4,4,0,0]],'1':[[2,0,2,4],[1,3,2,4],[1,0,3,0]],'2':[[0,4,4,4],[4,4,4,2],[4,2,0,2],[0,2,0,0],[0,0,4,0]],'3':[[0,4,4,4],[4,4,4,0],[4,0,0,0],[0,2,4,2]],'4':[[0,4,0,2],[0,2,4,2],[4,4,4,0]],'5':[[4,4,0,4],[0,4,0,2],[0,2,4,2],[4,2,4,0],[4,0,0,0]],'6':[[4,4,0,4],[0,4,0,0],[0,0,4,0],[4,0,4,2],[4,2,0,2]],'7':[[0,4,4,4],[4,4,2,0]],'8':[[0,0,4,0],[4,0,4,4],[4,4,0,4],[0,4,0,0],[0,2,4,2]],'9':[[4,0,4,4],[4,4,0,4],[0,4,0,2],[0,2,4,2]],'+':[[2,0,2,4],[0,2,4,2]],'-':[[0,2,4,2]],':':[[2,1,2,1.5],[2,2.5,2,3]],'T':[[0,4,4,4],[2,4,2,0]],'I':[[2,0,2,4],[1,0,3,0],[1,4,3,4]],'M':[[0,0,0,4],[0,4,2,2],[2,2,4,4],[4,4,4,0]],'E':[[4,4,0,4],[0,4,0,0],[0,0,4,0],[0,2,3,2]],'A':[[0,0,0,3],[0,3,2,4],[2,4,4,3],[4,3,4,0],[0,2,4,2]],'N':[[0,0,0,4],[0,4,4,0],[4,0,4,4]],'O':[[0,0,4,0],[4,0,4,4],[4,4,0,4],[0,4,0,0]],'L':[[0,4,0,0],[0,0,4,0]],'Y':[[0,4,2,2],[4,4,2,2],[2,2,2,0]]};function buildTextGeometry(text,x,y,scale){const points=[];let currentX=x;const charSpacing=6*scale;for(let i=0;i<text.length;i++){const char=text[i].toUpperCase();if(char===' '){currentX+=charSpacing;continue}const glyph=GLYPHS[char];if(glyph){glyph.forEach(line=>{points.push(new THREE.Vector3(currentX+line[0]*scale,y+line[1]*scale,0),new THREE.Vector3(currentX+line[2]*scale,y+line[3]*scale,0))});} currentX+=charSpacing}return new THREE.BufferGeometry().setFromPoints(points)}
const uiGroup=new THREE.Group();const baseMaterial=new THREE.LineBasicMaterial({color:PALETTE.rulerBase});const tickMaterial=new THREE.LineBasicMaterial({color:PALETTE.uiText});const gridMaterial=new THREE.LineBasicMaterial({color:PALETTE.gridFaint,transparent:true,opacity:0.5});const textMaterial=new THREE.LineBasicMaterial({color:PALETTE.uiText});const RULER_Y_TOP=4.8;const RULER_Y_BOTTOM=-4.5;const horizLines=[];horizLines.push(new THREE.Vector3(-30,RULER_Y_TOP,0),new THREE.Vector3(30,RULER_Y_TOP,0));horizLines.push(new THREE.Vector3(-30,RULER_Y_BOTTOM,0),new THREE.Vector3(30,RULER_Y_BOTTOM,0));uiGroup.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(horizLines),baseMaterial));const tickPoints=[];const gridPoints=[];for(let x=-20;x<=20;x+=0.5){const isMajor=x%2===0;const tickLength=isMajor?0.4:0.15;tickPoints.push(new THREE.Vector3(x,RULER_Y_BOTTOM,0),new THREE.Vector3(x,RULER_Y_BOTTOM+tickLength,0));tickPoints.push(new THREE.Vector3(x,RULER_Y_TOP,0),new THREE.Vector3(x,RULER_Y_TOP-tickLength,0));if(isMajor){gridPoints.push(new THREE.Vector3(x,RULER_Y_BOTTOM,-2),new THREE.Vector3(x,RULER_Y_TOP,-2));const numStr=(x>0?'+':'')+x.toString();const labelGeo=buildTextGeometry(numStr,x-(numStr.length*0.1),RULER_Y_BOTTOM-0.6,0.05);uiGroup.add(new THREE.LineSegments(labelGeo,textMaterial))}}uiGroup.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(tickPoints),tickMaterial));uiGroup.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(gridPoints),gridMaterial));
const crosshairPoints=[];for(let x=-18;x<=18;x+=6){for(let y=-2.5;y<=2.5;y+=2.5){crosshairPoints.push(new THREE.Vector3(x-0.3,y,-1),new THREE.Vector3(x+0.3,y,-1),new THREE.Vector3(x,y-0.3,-1),new THREE.Vector3(x,y+0.3,-1))}}uiGroup.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(crosshairPoints),new THREE.LineBasicMaterial({color:PALETTE.crosshair})));uiGroup.add(new THREE.LineSegments(buildTextGeometry("ANOMALY",-8.5,5.2,0.08),textMaterial));uiGroup.add(new THREE.LineSegments(buildTextGeometry("TIME",-10,5.2,0.08),textMaterial));scene.add(uiGroup);
const streamGroup=new THREE.Group();scene.add(streamGroup);const buildRibbonLayer=(color,numLines,freqScale,ampScale)=>{const material=new THREE.LineBasicMaterial({color:color,transparent:true,opacity:0.12,blending:THREE.AdditiveBlending,depthWrite:false});const lines=[];const pointsPerLine=400;for(let i=0;i<numLines;i++){const geo=new THREE.BufferGeometry();const positions=new Float32Array(pointsPerLine*3);geo.setAttribute('position',new THREE.BufferAttribute(positions,3));const line=new THREE.Line(geo,material);line.userData={index:i,points:pointsPerLine,phaseOffset:(i/numLines)*Math.PI*2,freqJitter:1.0+(i/numLines)*0.05*freqScale,amp:ampScale};lines.push(line);streamGroup.add(line)}return lines};const ribbonsCore=buildRibbonLayer(PALETTE.primaryLine,80,1.0,2.2);const ribbonsShell=buildRibbonLayer(PALETTE.secondaryLine,100,1.5,3.0);
const branchMaterial=new THREE.LineBasicMaterial({color:PALETTE.tertiaryLine,transparent:true,opacity:0.4,blending:THREE.AdditiveBlending});const branches=[];for(let i=0;i<15;i++){const geo=new THREE.BufferGeometry();const pos=new Float32Array(200*3);geo.setAttribute('position',new THREE.BufferAttribute(pos,3));const line=new THREE.Line(geo,branchMaterial);line.userData={seed:Math.random()*Math.PI*2,spread:(i-7)*0.1};branches.push(line);streamGroup.add(line)}
const particleGeo=new THREE.BufferGeometry();const particleCount=2000;const particlePositions=new Float32Array(particleCount*3);const particleLifetimes=new Float32Array(particleCount);for(let i=0;i<particleCount;i++){particlePositions[i*3]=(Math.random()-0.5)*40;particlePositions[i*3+1]=(Math.random()-0.5)*2-2;particlePositions[i*3+2]=(Math.random()-0.5)*2;particleLifetimes[i]=Math.random()}particleGeo.setAttribute('position',new THREE.BufferAttribute(particlePositions,3));particleGeo.setAttribute('lifetime',new THREE.BufferAttribute(particleLifetimes,1));const particleMaterial=new THREE.ShaderMaterial({uniforms:{time:{value:0},color:{value:new THREE.Color(PALETTE.uiText)}},vertexShader:`attribute float lifetime;varying float vAlpha;uniform float time;void main(){vec3 pos=position;float centerDist=abs(pos.x);float rise=fract(lifetime+time*0.1)*6.0;if(centerDist<4.0){pos.y+=rise*(1.0-centerDist/4.0);}vAlpha=sin(fract(lifetime+time*0.1)*3.14159);vAlpha*=smoothstep(8.0,0.0,centerDist);vec4 mvPosition=modelViewMatrix*vec4(pos,1.0);gl_PointSize=2.0*(10.0/-mvPosition.z);gl_Position=projectionMatrix*mvPosition;}`,fragmentShader:`uniform vec3 color;varying float vAlpha;void main(){float dist=length(gl_PointCoord-vec2(0.5));if(dist>0.5)discard;float glow=smoothstep(0.5,0.0,dist);gl_FragColor=vec4(color,vAlpha*glow*0.8);}`,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false});const pointCloud=new THREE.Points(particleGeo,particleMaterial);scene.add(pointCloud);
let timecodeMesh=null;let warningMesh=null;function updateDynamicUI(timeStr,showWarning){if(timecodeMesh)scene.remove(timecodeMesh);if(warningMesh)scene.remove(warningMesh);const tcGeo=buildTextGeometry(timeStr,5,5.2,0.08);timecodeMesh=new THREE.LineSegments(tcGeo,textMaterial);scene.add(timecodeMesh);if(showWarning){const warnPoints=[new THREE.Vector3(-9.5,5.0,0),new THREE.Vector3(-8.5,5.0,0),new THREE.Vector3(-8.5,5.0,0),new THREE.Vector3(-9.0,5.8,0),new THREE.Vector3(-9.0,5.8,0),new THREE.Vector3(-9.5,5.0,0),new THREE.Vector3(-9.0,5.6,0),new THREE.Vector3(-9.0,5.3,0),new THREE.Vector3(-9.0,5.15,0),new THREE.Vector3(-9.0,5.1,0)];warningMesh=new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(warnPoints),new THREE.LineBasicMaterial({color:PALETTE.primaryLine}));scene.add(warningMesh)}}
const clock=new THREE.Clock();function animate(){requestAnimationFrame(animate);const elapsed=clock.getElapsedTime();const updateRibbons=(lines,baseFreq,envFreq,speed)=>{lines.forEach(line=>{const pos=line.geometry.attributes.position.array;const d=line.userData;for(let j=0;j<d.points;j++){const x=(j/d.points)*40-20;const envelope=Math.sin(x*envFreq+elapsed*0.2)*d.amp;const carrierFreq=baseFreq*d.freqJitter;let y=envelope*Math.sin(x*carrierFreq+d.phaseOffset+elapsed*speed);const distToCenter=Math.abs(x+2.0);if(distToCenter<4.0){const severity=(1.0-(distToCenter/4.0));const noise=Math.sin(x*15.0+elapsed*10.0)*severity*0.8;y+=noise}pos[j*3]=x;pos[j*3+1]=y;pos[j*3+2]=Math.cos(x+elapsed)*0.5}line.geometry.attributes.position.needsUpdate=true})};updateRibbons(ribbonsCore,5.0,0.3,1.5);updateRibbons(ribbonsShell,4.0,0.25,1.0);branches.forEach((line)=>{const pos=line.geometry.attributes.position.array;const d=line.userData;for(let j=0;j<200;j++){const x=(j/200)*40-20;let y=0;if(x<-2.0){const env=Math.sin(x*0.3+elapsed*0.2)*2.2;y=env*Math.sin(x*5.0+d.seed+elapsed*1.5)}else{const branchProgress=x+2.0;const explosion=Math.pow(branchProgress,1.5)*d.spread;const chaoticPath=Math.sin(branchProgress*3.0+elapsed*5.0)*0.5;const baseEnv=Math.sin(-2.0*0.3+elapsed*0.2)*2.2;const baseY=baseEnv*Math.sin(-2.0*5.0+d.seed+elapsed*1.5);y=baseY+explosion+chaoticPath}pos[j*3]=x;pos[j*3+1]=y;pos[j*3+2]=2.0}line.geometry.attributes.position.needsUpdate=true});particleMaterial.uniforms.time.value=elapsed;const timeVal=Math.abs(Math.sin(elapsed*0.1)*9999);const ms=Math.floor((timeVal-Math.floor(timeVal))*100);const timeStr="- 0 0 : 0 4 : 1 8 6 "+ms.toString().padStart(2,'0');const isDegrading=Math.sin(elapsed*2.5)>0.8;updateDynamicUI(timeStr,isDegrading);renderer.render(scene,camera)}
window.addEventListener('resize',()=>{const aspect=window.innerWidth/window.innerHeight;camera.left=frustumSize*aspect/-2;camera.right=frustumSize*aspect/2;camera.top=frustumSize/2;camera.bottom=frustumSize/-2;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight)});animate();
</script></body></html>
