<!DOCTYPE html>
<html><head><title>Edit Full Portrait</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a1a;color:#eee;font-family:monospace;padding:16px}
canvas{cursor:crosshair;border:1px solid #333}
.tools{display:flex;gap:6px;margin:8px 0;flex-wrap:wrap}
button{padding:6px 14px;background:#333;color:#eee;border:1px solid #555;border-radius:4px;cursor:pointer;font-size:11px}
button:hover{background:#444}
button.active{border-color:#ff6b9d;color:#ff6b9d}
button.primary{background:#ff6b9d;border-color:#ff6b9d;color:#111}
.palette{display:flex;flex-wrap:wrap;gap:3px;margin:8px 0}
.swatch{width:22px;height:22px;border:2px solid transparent;border-radius:3px;cursor:pointer}
.swatch.active{border-color:#fff}
.swatch.eraser{background:repeating-conic-gradient(#333 0% 25%,#555 0% 50%) 50%/10px 10px}
.info{font-size:10px;color:#666;margin:4px 0}
#output{white-space:pre;font-size:9px;max-height:250px;overflow:auto;background:#111;padding:8px;border-radius:4px;color:#4dd0e1;margin-top:8px}
.workspace{display:flex;gap:16px}
</style></head><body>
<h3 style="font-size:13px;color:#888;margin-bottom:8px">Full portrait — erase background pixels, then Copy TSX</h3>
<div class="tools">
  <button id="bPaint" class="active" onclick="T='paint';upTools()">🖌 Paint</button>

  <button id="bPick" onclick="T='pick';upTools()">💧 Pick</button>
  <button id="bFill" onclick="T='fill';upTools()">🪣 Fill</button>
  <button onclick="undo()">↩ Undo</button>
  <button class="primary" onclick="copyTSX()">📋 Copy TSX</button>
</div>
<div class="workspace">
<div>
<canvas id="c"></canvas>
<div class="info" id="info">hover...</div>
<div class="palette" id="pal"></div>
</div>
<div id="output">...</div>
</div>

function rn(){
  PS=Math.max(3,Math.floor(Math.min(800/W,900/H)));
  cv.width=W*PS;cv.height=H*PS;
  cx.fillStyle='#232323';cx.fillRect(0,0,cv.width,cv.height);
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    if(!G[y][x]){cx.fillStyle=(x+y)%2==0?'#2a2a2a':'#1e1e1e';cx.fillRect(x*PS,y*PS,PS,PS)}
    else{cx.fillStyle=G[y][x];cx.fillRect(x*PS,y*PS,PS,PS)}
  }
  cx.strokeStyle='rgba(255,255,255,0.04)';cx.lineWidth=0.5;
  for(let x=0;x<=W;x++){cx.beginPath();cx.moveTo(x*PS,0);cx.lineTo(x*PS,H*PS);cx.stroke()}
  for(let y=0;y<=H;y++){cx.beginPath();cx.moveTo(0,y*PS);cx.lineTo(W*PS,y*PS);cx.stroke()}
}
function mkPal(){
  const el=document.getElementById('pal');el.innerHTML='';
  const e=document.createElement('div');e.className='swatch eraser'+(CC==''?' active':'');e.onclick=()=>{CC='';mkPal()};el.appendChild(e);
  PAL.forEach(h=>{const s=document.createElement('div');s.className='swatch'+(CC==h?' active':'');s.style.background=h;s.onclick=()=>{CC=h;T='paint';upTools();mkPal()};el.appendChild(s)})
}
function upTools(){document.querySelectorAll('.tools button').forEach(b=>b.classList.remove('active'));const m={paint:'bPaint',erase:'bErase',pick:'bPick',fill:'bFill'};if(m[T])document.getElementById(m[T]).classList.add('active')}
function sh(){hist.push(G.map(r=>[...r]));if(hist.length>50)hist.shift()}
function undo(){if(!hist.length)return;G=hist.pop();rn();tsx()}
function gc(e){const r=cv.getBoundingClientRect();return{x:Math.max(0,Math.min(W-1,Math.floor((e.clientX-r.left)/PS))),y:Math.max(0,Math.min(H-1,Math.floor((e.clientY-r.top)/PS)))}}
function ap(x,y){
  if(!G[y])return;
  if(T=='paint')G[y][x]=CC;
  else if(T=='erase')G[y][x]='';
  else if(T=='pick'){if(G[y][x]){CC=G[y][x];T='paint';upTools();mkPal()}}
  else if(T=='fill'){ff(x,y,G[y][x],CC)}
  rn();
}
function ff(x,y,t,r){if(t==r)return;const s=[[x,y]],v=new Set();while(s.length){const[a,b]=s.pop();const k=a+','+b;if(v.has(k)||a<0||a>=W||b<0||b>=H)continue;if(G[b][a]!=t)continue;v.add(k);G[b][a]=r;s.push([a+1,b],[a-1,b],[a,b+1],[a,b-1])}}
let dr=false;
cv.onmousedown=e=>{dr=true;sh();const{x,y}=gc(e);ap(x,y);tsx()};
cv.onmousemove=e=>{const{x,y}=gc(e);document.getElementById('info').textContent=`(${x},${y}) ${G[y]?.[x]||'transparent'}`;if(dr&&(T=='paint'||T=='erase')){ap(x,y);tsx()}};
cv.onmouseup=()=>dr=false;cv.onmouseleave=()=>dr=false;
function tsx(){
  const cm=new Map();let i=0;
  for(const r of G)for(const c of r)if(c&&!cm.has(c))cm.set(c,'c'+(i++));
  let o="const _ = '' // transparent\n";
  for(const[h,n]of cm)o+=`const ${n} = '${h}'\n`;
  o+=`\nconst PIXELS: string[][] = [\n`;
  for(const r of G)o+=`  [${r.map(c=>c?cm.get(c):'_').join(',')}],\n`;
  o+=`]\n\nconst PIXEL_SIZE = 9\nconst WIDTH = ${W}\nconst HEIGHT = ${H}`;
  document.getElementById('output').textContent=o;
}
function copyTSX(){navigator.clipboard.writeText(document.getElementById('output').textContent).then(()=>alert('Copied!'))}
mkPal();rn();tsx();
